services:
  spoolman:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Fixture is mounted read-only at a staging path.
      # The entrypoint copies it to /data/spoolman.json before starting
      # so each test run starts from the same fixture state.
      - ./assets/spoolman.json:/fixtures/spoolman.json:ro
    # Copy fixture into the writable /data dir, then start the server.
    entrypoint: ["/bin/sh", "-c", "cp /fixtures/spoolman.json /data/spoolman.json && exec /spoolman"]
    environment:
      - SPOOLMAN_DATA_FILE=/data/spoolman.json
      - SPOOLMAN_LOGGING_LEVEL=INFO
    security_opt:
      - no-new-privileges:true
